<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>MindAR PRO</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>

    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial;
      background: rgba(0,0,0,0.85);
      transition: .4s;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

  </style>
</head>

<body>

<div id="overlay">
  Escaneando marcador...
</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./targets/targets.mind;
    maxTrack: 2;
    filterMinCF: 0.0001;
    filterBeta: 0.001;
  "
  color-space="sRGB"
  renderer="
    colorManagement: true;
    physicallyCorrectLights: true;
    antialias: true;
    alpha: true;
  "
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <!-- ASSETS -->
  <a-assets>

    <!-- VIDEO -->
    <video
      id="video1"
      src="./assets/videos/video1.mp4"
      preload="auto"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <!-- CAMERA -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- TARGET -->
  <a-entity
    mindar-image-target="targetIndex: 0"
    target-video
  >

    <!-- VIDEO -->
    <a-video
      id="videoPlane"
      src="#video1"
      width="1"
      height="0.56"
      position="0 0 0"
    ></a-video>

  </a-entity>

</a-scene>

<script>

AFRAME.registerComponent("target-video", {

  init() {

    const video = document.querySelector("#video1");

    const overlay = document.querySelector("#overlay");

    this.el.addEventListener("targetFound", async () => {

      console.log("TARGET DETECTADO");

      overlay.classList.add("hidden");

      try {

        video.currentTime = 0;

        await video.play();

        console.log("VIDEO REPRODUCIENDO");

      } catch(e) {

        console.log("ERROR VIDEO:", e);

      }

    });

    this.el.addEventListener("targetLost", () => {

      console.log("TARGET PERDIDO");

      video.pause();

    });

  }

});

</script>

</body>
</html>
