<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1,
    maximum-scale=1,
    user-scalable=no,
    viewport-fit=cover
  "
/>

<title>MindAR MultiTarget PRO</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

<!-- MINDAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

body {
  position: fixed;
  inset: 0;
}

a-scene {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
}

canvas {
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover;
}

#overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,.85);
  color: white;
  font-family: Arial;
  transition: .4s;
}

#overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 5px solid rgba(255,255,255,.2);
  border-top: 5px solid white;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.text {
  font-size: 18px;
  letter-spacing: 1px;
}

#status {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  background: rgba(0,0,0,.7);
  color: white;
  padding: 12px 18px;
  border-radius: 14px;
  font-family: Arial;
  font-size: 14px;
  opacity: 0;
  transition: .3s;
  backdrop-filter: blur(10px);
}

#status.show {
  opacity: 1;
}

</style>

</head>

<body>

<!-- LOADING -->
<div id="overlay">

  <div class="loader"></div>

  <div class="text">
    Escaneando marcador...
  </div>

</div>

<!-- STATUS -->
<div id="status"></div>

<!-- SCENE -->
<a-scene

  mindar-image="
    imageTargetSrc: ./targets/targets.mind;
    maxTrack: 2;
    filterMinCF: 0.0001;
    filterBeta: 0.001;
    warmupTolerance: 5;
    missTolerance: 10;
  "

  color-space="sRGB"

  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    antialias: true;
    alpha: true;
  "

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

>

<!-- CAMERA -->
<a-camera
  position="0 0 0"
  look-controls="enabled: false"
></a-camera>

<!-- TARGET 0 -->
<a-entity
  mindar-image-target="targetIndex: 0"
  dynamic-video="name: Ninos; src: ./assets/videos/ninos.webm"
></a-entity>

<!-- TARGET 1 -->
<a-entity
  mindar-image-target="targetIndex: 1"
  dynamic-video="name: Canoa; src: ./assets/videos/canoa.webm"
></a-entity>

<!-- TARGET 2 -->
<a-entity
  mindar-image-target="targetIndex: 2"
  dynamic-video="name: Cacao; src: ./assets/videos/cacao.webm"
></a-entity>

<!-- TARGET 3 -->
<a-entity
  mindar-image-target="targetIndex: 3"
  dynamic-video="name: Manos; src: ./assets/videos/manos.webm"
></a-entity>

<!-- TARGET 4 -->
<a-entity
  mindar-image-target="targetIndex: 4"
  dynamic-video="name: Pajaro; src: ./assets/videos/pajaro.webm"
></a-entity>

</a-scene>

<script>

const overlay = document.querySelector("#overlay");
const statusBox = document.querySelector("#status");

AFRAME.registerComponent("dynamic-video", {

  schema: {

    name: { type: "string" },

    src: { type: "string" }

  },

  init() {

    let video = null;

    let plane = null;

    let loaded = false;

    this.el.addEventListener("targetFound", async () => {

      console.log("TARGET DETECTADO:", this.data.name);

      overlay.classList.add("hidden");

      statusBox.innerHTML = this.data.name;

      statusBox.classList.add("show");

      // vibración
      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      // cargar solo una vez
      if (!loaded) {

        loaded = true;

        // VIDEO
        video = document.createElement("video");

        video.src = this.data.src;

        video.crossOrigin = "anonymous";

        video.loop = true;

        video.muted = true;

        video.playsInline = true;

        video.setAttribute("webkit-playsinline", true);

        video.preload = "auto";

        // esperar carga
        await video.load();

        // PLANO
        plane = document.createElement("a-plane");

        plane.setAttribute("width", "1");

        plane.setAttribute("height", "0.56");

        plane.setAttribute("position", "0 0 0");

        plane.setAttribute(
          "material",
          `
          shader: flat;
          src: ${this.data.src};
          transparent: true;
          `
        );

        this.el.appendChild(plane);

      }

      try {

        video.currentTime = 0;

        await video.play();

      } catch(e) {

        console.log("ERROR VIDEO:", e);

      }

    });

    this.el.addEventListener("targetLost", () => {

      statusBox.classList.remove("show");

      if(video){

        video.pause();

      }

    });

  }

});

</script>

</body>
</html>
