<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      maximum-scale=1,
      user-scalable=no,
      viewport-fit=cover
    "
  />

  <title>MindAR MultiTarget</title>

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    body {
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
    }

    canvas {
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.85);
      color: white;
      font-family: Arial;
      transition: .4s;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,.2);
      border-top: 5px solid white;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .text {
      font-size: 18px;
      letter-spacing: 1px;
    }

  </style>

</head>

<body>

<!-- OVERLAY -->
<div id="overlay">

  <div class="loader"></div>

  <div class="text">
    Escaneando marcador...
  </div>

</div>

<!-- SCENE -->
<a-scene

  mindar-image="
    imageTargetSrc: ./targets/targets.mind;
    maxTrack: 2;
    filterMinCF: 0.0001;
    filterBeta: 0.001;
    warmupTolerance: 5;
    missTolerance: 10;
  "

  color-space="sRGB"

  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    antialias: true;
    alpha: true;
  "

  vr-mode-ui="enabled: false"

  device-orientation-permission-ui="enabled: false"

>

  <!-- ASSETS -->
  <a-assets timeout="30000">

    <!-- VIDEOS -->

    <video
      id="ninosVideo"
      src="./assets/videos/ninos.webm"
      preload="auto"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

    <video
      id="canoaVideo"
      src="./assets/videos/canoa.webm"
      preload="auto"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

    <video
      id="cacaoVideo"
      src="./assets/videos/cacao.webm"
      preload="auto"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

    <video
      id="manosVideo"
      src="./assets/videos/manos.webm"
      preload="auto"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

    <video
      id="pajaroVideo"
      src="./assets/videos/pajaro.webm"
      preload="auto"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
    ></video>

  </a-assets>

  <!-- CAMERA -->
  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
  ></a-camera>

  <!-- TARGET 0 - NINOS -->
  <a-entity mindar-image-target="targetIndex: 0" video-handler>

    <a-plane
      width="1"
      height="0.56"
      material="
        shader: flat;
        src: #ninosVideo;
        transparent: true;
      "
    ></a-plane>

  </a-entity>

  <!-- TARGET 1 - CANOA -->
  <a-entity mindar-image-target="targetIndex: 1" video-handler>

    <a-plane
      width="1"
      height="0.56"
      material="
        shader: flat;
        src: #canoaVideo;
        transparent: true;
      "
    ></a-plane>

  </a-entity>

  <!-- TARGET 2 - CACAO -->
  <a-entity mindar-image-target="targetIndex: 2" video-handler>

    <a-plane
      width="1"
      height="0.56"
      material="
        shader: flat;
        src: #cacaoVideo;
        transparent: true;
      "
    ></a-plane>

  </a-entity>

  <!-- TARGET 3 - MANOS -->
  <a-entity mindar-image-target="targetIndex: 3" video-handler>

    <a-plane
      width="1"
      height="0.56"
      material="
        shader: flat;
        src: #manosVideo;
        transparent: true;
      "
    ></a-plane>

  </a-entity>

  <!-- TARGET 4 - PAJARO -->
  <a-entity mindar-image-target="targetIndex: 4" video-handler>

    <a-plane
      width="1"
      height="0.56"
      material="
        shader: flat;
        src: #pajaroVideo;
        transparent: true;
      "
    ></a-plane>

  </a-entity>

</a-scene>

<script>

const overlay = document.querySelector("#overlay");

AFRAME.registerComponent("video-handler", {

  init() {

    const videos = this.el.querySelectorAll("video");

    this.el.addEventListener("targetFound", async () => {

      console.log("TARGET DETECTADO");

      overlay.classList.add("hidden");

      // reproducir video correspondiente
      const materials = this.el.querySelectorAll("a-plane");

      materials.forEach(async(plane) => {

        const material = plane.getAttribute("material");

        const src = material.src;

        const video = document.querySelector(src);

        if(video){

          try {

            video.currentTime = 0;

            await video.play();

          } catch(e){

            console.log(e);

          }

        }

      });

    });

    this.el.addEventListener("targetLost", () => {

      const materials = this.el.querySelectorAll("a-plane");

      materials.forEach((plane) => {

        const material = plane.getAttribute("material");

        const src = material.src;

        const video = document.querySelector(src);

        if(video){

          video.pause();

        }

      });

    });

  }

});

</script>

</body>
</html>
